sample:
  name: Zephyr STSAFE-A1xx Example
  description: Sample application demonstrating the use of STSAFE-A1xx secure element with Zephyr
tests:
  sample.example:
    integration_platforms:
      - zest_core_nrf5340/nrf5340/cpuapp/ns
    extra_args:
      - SHIELD=zest_security_secureelement
      - DTC_OVERLAY_FILE="sixtron_bus.overlay;boards/zest_core_nrf5340_nrf5340_cpuapp_ns.overlay"
    depends_on: i2c
