sample:
  name: Zephyr STSAFE-A1xx Tester
  description: Sample application for testing STSAFE-A1xx secure element with Zephyr
tests:
  sample.tester:
    integration_platforms:
      - zest_core_nrf5340/nrf5340/cpuapp/ns
    extra_args:
      - SHIELD=zest_security_secureelement
      - DTC_OVERLAY_FILE="sixtron_bus.overlay"
    depends_on: i2c
